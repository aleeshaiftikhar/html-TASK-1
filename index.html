<!DOCTYPE html>
<html>
<head>
<title>TASK 1</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

main{
    width:420px;
    background:white;
    border:2px solid #444;
    padding:8px;
}

header{
    height:40px;
    background:red;
    border:1px solid #666;
    margin-bottom:8px;
}

.blue{
    height:40px;
    background:#1fb7e8;
    border:1px solid #666;
    margin-bottom:8px;
}

.middle{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

article{
    width:60%;
}

.yellow{
    height:55px;
    background:#f6bb55;
    border:1px solid #666;
    margin-bottom:8px;
}

.orange{
    height:55px;
    background:#ff8a42;
    border:1px solid #666;
}

aside{
    width:40%;
    background:#eb4fb5;
    border:1px solid #666;
}

footer{
    height:40px;
    background:gray;
    border:1px solid #666;
}

</style>

</head>

<body>

<main>

<header></header>

<nav class="blue"></nav>

<nav class="middle">

    <article>

        <nav class="yellow"></nav>

        <nav class="orange"></nav>

    </article>

    <aside></aside>

</nav>

<footer></footer>

</main>

</body>
</html>
