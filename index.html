<!DOCTYPE html>
<html>

<head>
    
    <title>TASK 1</title>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: white;
        }

        main {
            width: 800px;
            border: 3px solid black;
            padding: 20px;
            box-sizing: border-box;

            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            height: 85px;
            background: red;
            border: 2px solid black;
        }

        nav.top {
            height: 75px;
            background: #20b8d4;
            border: 2px solid black;
        }

        article {
            display: flex;
            gap: 20px;
        }

        article.left {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        article.left header {
            height: 120px;
            background: #ffc15a;
            border: 2px solid black;
        }

        article.left nav {
            height: 125px;
            background: #ff9147;
            border: 2px solid black;
        }

        aside {
            width: 40%;
            height: 265px;
            background: #ef55b5;
            border: 2px solid black;
        }

        footer {
            height: 75px;
            background: gray;
            border: 2px solid black;
        }
    </style>
</head>

<body>

    <main>

        <header></header>

        <nav class="top"></nav>

        <article>

            <article class="left">

                <header></header>

                <nav></nav>

            </article>

            <aside></aside>

        </article>

        <footer></footer>

    </main>

</body>

</html>
