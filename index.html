<!DOCTYPE html>
<html >
<head>

<title>Task 1</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#fff;
}

main{
    width:420px;
    border:2px solid #444;
    padding:8px;
    background:#fff;
}

header{
    height:40px;
    background:red;
    border:1px solid #666;
    margin-bottom:8px;
}

.blue{
    height:40px;
    background:#19bde9;
    border:1px solid #666;
    margin-bottom:8px;
}

.middle{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

article{
    flex:2;
}

.yellow{
    height:55px;
    background:#f7bc57;
    border:1px solid #666;
    margin-bottom:8px;
}

.orange{
    height:55px;
    background:#ff8b43;
    border:1px solid #666;
}

aside{
    flex:1;
    background:#eb4fb5;
    border:1px solid #666;
}

footer{
    height:40px;
    background:gray;
    border:1px solid #666;
}

</style>

</head>

<body>

<main>

<header></header>

<div class="blue"></div>

<div class="middle">

    <article>

        <div class="yellow"></div>

        <div class="orange"></div>

    </article>

    <aside></aside>

</div>

<footer></footer>

</main>

</body>
</html>
